<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad de Conocimiento Deportivo</title>
    <style>
        :root { --verde: #2e7d32; --oro: #ffd600; --negro: #1a1a1a; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--negro); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; margin: 0; }
        
        #pantalla-inicio { text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; border: 3px solid var(--oro); box-shadow: 0 0 50px rgba(0,0,0,0.9); display: block; }
        #pantalla-inicio h1 { color: var(--oro); font-size: 2.2rem; margin-top: 0; }
        #pantalla-inicio p { color: var(--blanco); font-size: 1.1rem; max-width: 500px; line-height: 1.6; margin-bottom: 30px; }
        #btn-iniciar { background: var(--oro); color: var(--negro); border: none; padding: 18px 35px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 8px; text-transform: uppercase; transition: 0.3s; }
        #btn-iniciar:hover { background: var(--blanco); transform: scale(1.05); }

        #juego-contenedor { display: none; flex-direction: column; align-items: center; }
        #nivel-titulo { color: var(--oro); font-size: 1.5rem; margin-bottom: 10px; font-weight: bold; text-align: center; }
        #cronometro { font-size: 1.8rem; color: var(--oro); border: 2px solid var(--oro); padding: 5px 20px; border-radius: 10px; margin-bottom: 15px; background: black; }
        .tablero { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 950px; background: #004d00; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
        .carta { width: 140px; height: 80px; background: var(--verde); border: 1px solid white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; text-align: center; border-radius: 6px; padding: 5px; transition: 0.3s; user-select: none; }
        .carta.volteada { background: var(--blanco); color: black; }
        .carta.correcta { visibility: hidden; opacity: 0; }
        
        #mensaje-nivel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 30px; border-radius: 15px; text-align: center; border: 5px solid var(--oro); z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .btn-modal { background: var(--negro); color: var(--oro); border: 2px solid var(--oro); padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 15px; width: 100%; }
        @media (max-width: 800px) { .tablero { grid-template-columns: repeat(4, 1fr); } .carta { width: 85px; height: 70px; font-size: 0.65rem; } }
    </style>
</head>
<body>
    <div id="pantalla-inicio">
        <h1>Actividad de Conocimiento Deportivo</h1>
        <p>Esta actividad consta de **5 niveles** temáticos. Cada nivel completado te otorgará **+1.0 punto** para tu calificación final. Debes encontrar las 15 parejas de cada nivel para avanzar.</p>
        <button id="btn-iniciar" onclick="iniciarEvaluacion()">Iniciar Actividad (5 Niveles)</button>
    </div>

    <div id="juego-contenedor">
        <div id="nivel-titulo">Nivel 1: Entrenamiento Deportivo</div>
        <div id="cronometro">00:00</div>
        <div class="tablero" id="tablero"></div>
        <div id="mensaje-nivel">
            <h2 id="msg-h2">¡Nivel Completado!</h2>
            <p id="p-nota">Puntos: +1.0</p>
            <p id="tiempo-final"></p>
            <button class="btn-modal" id="btn-siguiente" onclick="siguienteNivel()">SIGUIENTE TEMA</button>
        </div>
    </div>

    <script>
        const niveles = [
            { t: "Nivel 1: Entrenamiento Deportivo", p: [{id:1,c:"Calentamiento"},{id:1,c:"Prevención Lesiones"},{id:2,c:"Estiramiento"},{id:2,c:"Flexibilidad"},{id:3,c:"Pesas"},{id:3,c:"Fuerza Muscular"},{id:4,c:"Cronómetro"},{id:4,c:"Control de Tiempo"},{id:5,c:"Hidratación"},{id:5,c:"Beber Agua"},{id:6,c:"Recuperación"},{id:6,c:"Descanso Post-Esfuerzo"},{id:7,c:"Puntos"},{id:7,c:"Marcador"},{id:8,c:"Uniforme"},{id:8,c:"Identidad de Equipo"},{id:9,c:"Entrenador"},{id:9,c:"Liderazgo y Guía"},{id:10,c:"Silbato"},{id:10,c:"Inicio y Fin"},{id:11,c:"Conos"},{id:11,c:"Circuito de Agilidad"},{id:12,c:"Balón"},{id:12,c:"Elemento de Juego"},{id:13,c:"Capitán"},{id:13,c:"Representante Campo"},{id:14,c:"Táctica"},{id:14,c:"Plan de Juego"},{id:15,c:"Medalla"},{id:15,c:"Premio al Éxito"}]},
            { t: "Nivel 2: Reglas y Arbitraje", p: [{id:1,c:"Tarjeta Roja"},{id:1,c:"Expulsión"},{id:2,c:"Tarjeta Amarilla"},{id:2,c:"Amonestación"},{id:3,c:"Fuera de Juego"},{id:3,c:"Posición Adelantada"},{id:4,c:"Penalti"},{id:4,c:"Falta en el Área"},{id:5,c:"Córner"},{id:5,c:"Saque de Esquina"},{id:6,c:"Árbitro"},{id:6,c:"Juez del Partido"},{id:7,c:"VAR"},{id:7,c:"Apoyo en Video"},{id:8,c:"Falta"},{id:8,c:"Infracción"},
