<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad Deportiva</title>
    <style>
        :root { --verde: #2e7d32; --oro: #ffd600; --negro: #1a1a1a; }
        body { font-family: sans-serif; background-color: var(--negro); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        /* Pantalla Inicial */
        #pantalla-inicio { text-align: center; border: 3px solid var(--oro); padding: 30px; border-radius: 15px; max-width: 500px; background: #000; }
        #btn-iniciar { background: var(--oro); color: black; border: none; padding: 20px 40px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 10px; margin-top: 20px; width: 100%; }
        
        /* Juego */
        #juego-contenedor { display: none; flex-direction: column; align-items: center; width: 100%; }
        .tablero { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; background: #004d00; padding: 10px; border-radius: 10px; }
        .carta { width: 140px; height: 80px; background: var(--verde); border: 1px solid white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; text-align: center; border-radius: 5px; user-select: none; }
        .carta.volteada { background: white; color: black; }
        .carta.correcta { visibility: hidden; }

        #mensaje-nivel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 15px; text-align: center; border: 4px solid var(--oro); z-index: 999; }
        @media (max-width: 850px) { .tablero { grid-template-columns: repeat(4, 1fr); } .carta { width: 85px; height: 70px; font-size: 0.6rem; } }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1 style="color:var(--oro)">Actividad de Conocimiento Deportivo</h1>
        <p>Esta actividad consta de **5 niveles**. Cada nivel completado suma **+1.0 punto** a tu nota final.</p>
        <button id="btn-iniciar" onclick="comenzar()">INICIAR ACTIVIDAD</button>
    </div>

    <div id="juego-contenedor">
        <h2 id="nivel-titulo" style="color:var(--oro)"></h2>
        <div id="cronometro" style="font-size:1.5rem; margin-bottom:10px;">00:00</div>
        <div class="tablero" id="tablero"></div>
    </div>

    <div id="mensaje-nivel">
        <h2 id="msg-h2">¡Nivel Superado!</h2>
        <p id="p-nota">Puntos: +1.0</p>
        <button onclick="siguienteNivel()" style="padding:10px 20px; font-weight:bold; cursor:pointer;">CONTINUAR</button>
    </div>

    <script>
        const niveles = [
            { t: "Nivel 1: Entrenamiento Deportivo", p: [{id:1,c:"Calentamiento"},{id:1,c:"Prevención Lesiones"},{id:2,c:"Estiramiento"},{id:2,c:"Flexibilidad"},{id:3,c:"Pesas"},{id:3,c:"Fuerza Muscular"},{id:4,c:"Cronómetro"},{id:4,c:"Control de Tiempo"},{id:5,c:"Hidratación"},{id:5,c:"Beber Agua"},{id:6,c:"Recuperación"},{id:6,c:"Descanso Post-Esfuerzo"},{id:7,c:"Puntos"},{id:7,c:"Marcador"},{id:8,c:"Uniforme"},{id:8,c:"Identidad de Equipo"},{id:9,c:"Entrenador"},{id:9,c:"Liderazgo y Guía"},{id:10,c:"Silbato"},{id:10,c:"Inicio y Fin"},{id:11,c:"Conos"},{id:11,c:"Agilidad"},{id:12,c:"Balón"},{id:12,c:"Elemento de Juego"},{id:13,c:"Capitán"},{id:13,c:"Representante"},{id:14,c:"Táctica"},{id:14,c:"Plan de Juego"},{id:15,c:"Medalla"},{id:15,c:"Éxito"}]},
            { t: "Nivel 2: Reglas y Arbitraje", p: [{id:1,c:"Tarjeta Roja"},{id:1,c:"Expulsión"},{id:2,c:"Tarjeta Amarilla"},{id:2,c:"Amonestación"},{id:3,c:"Fuera de Juego"},{id:3,c:"Posición Adelantada"},{id:4,c:"Penalti"},{id:4,c:"Falta en el Área"},{id:5,c:"Córner"},{id:5,c:"Saque de Esquina"},{id:6,c:"Árbitro"},{id:6,c:"Juez"},{id:7,c:"VAR"},{id:7,c:"Video"},{id:8,c:"Falta"},{id:8,c:"Infracción"},{id:9,c:"Mano"},{id:9,c:"Contacto Ilegal"},{id:10,c:"Prórroga"},{id:10,c:"Tiempo Extra"},{id:11,c:"Banda"},{id:11,c:"Saque Lateral"},{id:12,c:"Portero"},{id:12,c:"Guardameta"},{id:13,c:"Gol"},{id:13,c:"Punto"},{id:14,c:"Barrera"},{id:14,c:"Defensa"},{id:15,c:"Sustitución"},{id:15,c:"Cambio"}]},
            { t: "Nivel 3: Anatomía Humana", p: [{id:1,c:"Bíceps"},{id:1,c:"Brazo"},{id:2,c:"Fémur"},{id:2,c:"Muslo"},{id:3,c:"Cerebro"},{id:3,c:"Control"},{id:4,c:"Corazón"},{id:4,c:"Sangre"},{id:5,c:"Pulmones"},{id:5,c:"Aire"},{id:6,c:"Columna"},{id:6,c:"Soporte"},{id:7,c:"Craneo"},{id:7,c:"Cabeza"},{id:8,c:"Rodilla"},{id:8,c:"Articulación"},{id:9,c:"Abdominales"},{id:9,c:"Tronco"},{id:10,c:"Tobillo"},{id:10,c:"Pie"},{id:11,c:"Codo"},{id:11,c:"Articulación Brazo"},{id:12,c:"Hombro"},{id:12,c:"Torso"},{id:13,c:"Dientes"},{id:13,c:"Boca"},{id:14,c:"Piel"},{id:14,c:"Tacto"},{id:15,c:"Costillas"},{id:15,c:"Pecho"}]},
            { t: "Nivel 4: Capacidades Físicas", p: [{id:1,c:"Resistencia"},{id:1,c:"Aguante"},{id:2,c:"Velocidad"},{id:2,c:"Rapidez"},{id:3,c:"Flexibilidad"},{id:3,c:"Estirarse"},{id:4,c:"Fuerza"},{id:4,c:"Carga"},{id:5,c:"Equilibrio"},{id:5,c:"Estabilidad"},{id:6,c:"Coordinación"},{id:6,c:"Control"},{id:7,c:"Agilidad"},{id:7,c:"Movimiento"},{id:8,c:"Potencia"},{id:8,c:"Explosividad"},{id:9,c:"Reflejos"},{id:9,c:"Reacción"},{id:10,c:"Ritmo"},{id:10,c:"Paso"},{id:11,c:"Salto"},{id:11,c:"Vuelo"},{id:12,c:"Giro"},{id:12,c:"Rotación"},{id:13,c:"Empuje"},{id:13,c:"Salida"},{id:14,c:"Lanzamiento"},{id:14,c:"Distancia"},{id:15,c:"Precisión"},{id:15,c:"Puntería"}]},
            { t: "Nivel 5: Técnica y Táctica", p: [{id:1,c:"Pase"},{id:1,c:"Entrega"},{id:2,c:"Remate"},{id:2,c:"Tiro"},{id:3,c:"Regate"},{id:3,c:"Finta"},{id:4,c:"Control"},{id:4,c:"Dominio"},{id:5,c:"Centro"},{id:5,c:"Área"},{id:6,c:"Bloqueo"},{id:6,c:"Defensa"},{id:7,c:"Rebote"},{id:7,c:"Segunda Opción"},{id:8,c:"Marca"},{id:8,c:"Presión"},{id:9,c:"Desmarque"},{id:9,c:"Espacio"},{id:10,c:"Pared"},{id:10,c:"Devolución"},{id:11,c:"Estrategia"},{id:11,c:"Plan"},{id:12,c:"Ataque"},{id:12,c:"Ofensiva"},{id:13,c:"Defensa"},{id:13,c:"Protección"},{id:14,c:"Presión"},{id:14,c:"Acoso"},{id:15,c:"Finalización"},{id:15,c:"Golpe Final"}]}
        ];

        let nivelActual = 0, elegidas = [], aciertos = 0, segs = 0, timer, andando = false;

        function comenzar() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('juego-contenedor').style.display = 'flex';
            crearTablero();
        }

        function crearTablero() {
            const tab = document.getElementById('tablero'); tab.innerHTML = '';
            document.getElementById('nivel-titulo').innerText = niveles[nivelActual].t;
            const mazo = [...niveles[nivelActual].p].sort(() => Math.random() - 0.5);
            mazo.forEach(p => {
                const div = document.createElement('div'); div.className = 'carta'; div.innerText = "⚽";
                div.onclick = function() {
                    if(!andando) { timer = setInterval(() => { segs++; document.getElementById('cronometro').innerText = Math.floor(segs/60).toString().padStart(2,'0') + ":" + (segs%60).toString().padStart(2,'0'); }, 1000); andando = true; }
                    if(elegidas.length < 2 && !div.classList.contains('volteada')) {
                        div.classList.add('volteada'); div.innerText = p.c; elegidas.push({div, p});
                        if(elegidas.length === 2) {
                            if(elegidas[0].p.id === elegidas[1].p.id) {
                                setTimeout(() => { elegidas.forEach(e => e.div.classList.add('correcta')); elegidas = []; aciertos++; if(aciertos === 15) ganarNivel(); }, 400);
                            } else {
                                setTimeout(() => { elegidas.forEach(e => { e.div.classList.remove('volteada'); e.div.innerText = "⚽"; }); elegidas = []; }, 800);
                            }
                        }
                    }
                };
                tab.appendChild(div);
            });
        }

        function ganarNivel() {
            clearInterval(timer);
            if(nivelActual === 4) { 
                document.getElementById('msg-h2').innerText = "¡ACTIVIDAD COMPLETADA!"; 
                document.getElementById('p-nota').innerText = "NOTA FINAL: 5.0"; 
            }
            document.getElementById('mensaje-nivel').style.display = 'block';
        }

        function siguienteNivel() {
            document.getElementById('mensaje-nivel').style.display = 'none';
            if(nivelActual < 4) { nivelActual++; aciertos = 0; segs = 0; andando = false; document.getElementById('cronometro').innerText = "00:00"; crearTablero(); }
            else { location.reload(); }
        }
    </script>
</body>
</html>
