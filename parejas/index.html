<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Integral: Ciencias del Deporte</title>
    <style>
        :root { --verde: #1b5e20; --oro: #c6a700; --negro: #0a0a0a; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--negro); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid var(--oro); width: 100%; max-width: 900px; padding-bottom: 10px; }
        #nivel-titulo { color: var(--oro); font-size: 1.3rem; text-transform: uppercase; font-weight: bold; }
        #cronometro { font-size: 1.6rem; color: #ff5252; font-weight: bold; margin-top: 5px; }
        .tablero { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; max-width: 1000px; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .carta { width: 150px; height: 90px; background: var(--verde); border: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.72rem; font-weight: 600; text-align: center; border-radius: 4px; padding: 5px; transition: 0.2s; overflow: hidden; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .carta.volteada { background: var(--gris); color: black; border: 2px solid var(--oro); }
        .carta.correcta { visibility: hidden; opacity: 0; transition: 0.5s; }
        #mensaje-nivel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 40px; border-radius: 8px; text-align: center; z-index: 1000; border: 5px solid var(--oro); box-shadow: 0 0 100px rgba(0,0,0,0.9); width: 80%; max-width: 400px; }
        button { background: var(--negro); color: var(--oro); border: 2px solid var(--oro); padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; margin-top: 20px; width: 100%; }
        button:hover { background: var(--oro); color: black; }
        @media (max-width: 900px) { .tablero { grid-template-columns: repeat(4, 1fr); } .carta { width: 100px; height: 80px; font-size: 0.65rem; } }
    </style>
</head>
<body>
    <div class="header">
        <div id="nivel-titulo">Cargando Evaluación...</div>
        <div id="cronometro">00:00</div>
    </div>
    <div class="tablero" id="tablero"></div>
    <div id="mensaje-nivel">
        <h2 id="msg-h2">¡NIVEL SUPERADO!</h2>
        <p id="p-nota">Calificación parcial: +1.0</p>
        <p id="tiempo-final"></p>
        <button id="btn-siguiente" onclick="siguienteNivel()">Siguiente Examen</button>
    </div>

    <script>
        const niveles = [
            { t: "Nivel 1: Metodología y Planificación", p: [{id:1,c:"Supercompensación"},{id:1,c:"Adaptación Post-Esfuerzo"},{id:2,c:"Microciclo de Choque"},{id:2,c:"Máxima Intensidad Semanal"},{id:3,c:"Carga Externa"},{id:3,c:"Magnitud Física (Kg/Km)"},{id:4,c:"Carga Interna"},{id:4,c:"Respuesta Orgánica (FC/VPE)"},{id:5,c:"VAM"},{id:5,c:"Velocidad Aeróbica Máxima"},{id:6,c:"Pliometría"},{id:6,c:"Ciclo Estiramiento-Acortamiento"},{id:7,c:"Principio de Especificidad"},{id:7,c:"Similitud al Gesto Competitivo"},{id:8,c:"Mesociclo de Acumulación"},{id:8,c:"Base de Volumen Elevado"},{id:9,c:"Densidad del Entrenamiento"},{id:9,c:"Relación Trabajo-Pausa"},{id:10,c:"Tapering"},{id:10,c:"Puesta a Punto Competitiva"},{id:11,c:"Escala de Borg"},{id:11,c:"Esfuerzo Percibido"},{id:12,c:"Fuerza Explosiva"},{id:12,c:"RFD (Rate of Force Development)"},{id:13,c:"Periodización"},{id:13,c:"Estructura del Macrociclo"},{id:14,c:"Entrenamiento Concurrente"},{id:14,c:"Fuerza y Resistencia en Sesión"},{id:15,c:"Vatios (Watts)"},{id:15,c:"Medida de Potencia Mecánica"}]},
            { t: "Nivel 2: Reglamento FIFA Avanzado", p: [{id:1,c:"DOGSO"},{id:1,c:"Impedir Gol Manifiesto"},{id:2,c:"Protocolo VAR"},{id:2,c:"Error Claro y Manifiesto"},{id:3,c:"Tiro Libre Indirecto"},{id:3,c:"Juego Peligroso sin Contacto"},{id:4,c:"Ley de Ventaja"},{id:4,c:"Criterio de Fluidez"},{id:5,c:"Fuera de Juego"},{id:5,c:"Interferencia en el Adversario"},{id:6,c:"Conducta Violenta"},{id:6,c:"Expulsión (Roja Directa)"},{id:7,c:"Temeridad"},{id:7,c:"Amonestación (Amarilla)"},{id:8,c:"Mano Accidental"},{id:8,c:"No Sancionable en Defensa"},{id:9,c:"Sustitución por Conmoción"},{id:9,c:"Cambio Extra Reglamentario"},{id:10,c:"Balón a Tierra"},{id:10,c:"Interrupción Externa"},{id:11,c:"Regla 14"},{id:11,c:"Ejecución de Penal"},{id:12,c:"Cuarto Árbitro"},{id:12,c:"Gestión Administrativa"},{id:13,c:"Área de Meta"},{id:13,c:"Protección del Guardameta"},{id:14,c:"Equipamiento"},{id:14,c:"Canilleras y Seguridad"},{id:15,c:"Tiempo de Adición"},{id:15,c:"Compensación de Pérdidas"}]},
            { t: "Nivel 3: Biomecánica y Kinesiología", p: [{id:1,c:"Plano Sagital"},{id:1,c:"Eje Mediolateral (Flexión)"},{id:2,c:"Isometría"},{id:2,c:"Tensión sin Desplazamiento"},{id:3,c:"Contracción Excéntrica"},{id:3,c:"Alargamiento bajo Tensión"},{id:4,c:"Cadena Cinética Cerrada"},{id:4,c:"Apoyo Distal Fijo"},{id:5,c:"Manguito Rotador"},{id:5,c:"Estabilidad Glenohumeral"},{id:6,c:"LCA (Ligamento)"},{id:6,c:"Estabilidad Anterior Rodilla"},{id:7,c:"Propiocepción"},{id:7,c:"Mecanorreceptores Musculares"},{id:8,c:"Palanca de 3er Grado"},{id:8,c:"Mayoría de Articulaciones"},{id:9,c:"Torque"},{id:9,c:"Momento de Fuerza"},{id:10,c:"Agonista"},{id:10,c:"Músculo Motor Primario"},{id:11,c:"Antagonista"},{id:11,c:"Músculo que se Elonga"},{id:12,c:"Fascia Plantar"},{id:12,c:"Amortiguación del Arco"},{id:13,c:"Eje Anteroposterior"},{id:13,c:"Movimientos de Abducción"},{id:14,c:"Sinartrosis"},{id:14,c:"Articulaciones Inmóviles"},{id:15,c:"Vasto Medial"},{id:15,c:"Guía de la Patela"}]},
            { t: "Nivel 4: Fisiología del Ejercicio", p: [{id:1,c:"VO2 Máximo"},{id:1,c:"Capacidad Aeróbica Límite"},{id:2,c:"Glucólisis Anaeróbica"},{id:2,c:"Vía de los Fosfágenos"},{id:3,c:"Umbral de Lactato"},{id:3,c:"Punto de Deflexión de FC"},{id:4,c:"Fibras Tipo I"},{id:4,c:"Contracción Lenta (Oxidativas)"},{id:5,c:"EPOC"},{id:5,c:"Consumo Oxígeno Post-Esfuerzo"},{id:6,c:"Gasto Cardíaco"},{id:6,c:"Volumen Sistólico x FC"},{id:7,c:"Mioglobina"},{id:7,c:"Transporte Oxígeno Muscular"},{id:8,c:"Mitocondrias"},{id:8,c:"Respiración Celular"},{id:9,c:"Ciclo de Cori"},{id:9,c:"Lactato a Glucosa (Hígado)"},{id:10,c:"Catecolaminas"},{id:10,c:"Adrenalina y Noradrenalina"},{id:11,c:"Glucógeno"},{id:11,c:"Reserva de Hidratos"},{id:12,c:"Hemoglobina"},{id:12,c:"Transporte Oxígeno Sangre"},{id:13,c:"Homeostasis"},{id:13,c:"Equilibrio del Medio Interno"},{id:14,c:"Vasodilatación"},{id:14,c:"Aumento del Flujo Periférico"},{id:15,c:"Acidosis Metabólica"},{id:15,c:"Descenso del pH Muscular"}]},
            { t: "Nivel 5: Psicología y Pedagogía", p: [{id:1,c:"Feedback Intrínseco"},{id:1,c:"Sensación del propio Gesto"},{id:2,c:"Feedback Extrínseco"},{id:2,c:"Corrección del Entrenador"},{id:3,c:"Atención Selectiva"},{id:3,c:"Foco en Estímulos Relevantes"},{id:4,c:"Motivación Intrínseca"},{id:4,c:"Placer por la Actividad"},{id:5,c:"Autoeficacia"},{id:5,c:"Creencia en Capacidad Propia"},{id:6,c:"Estado de Flow"},{id:6,c:"Inmersión Total en Tarea"},{id:7,c:"Aprendizaje Significativo"},{id:7,c:"Conexión con Saberes Previos"},{id:8,c:"Visualización"},{id:8,c:"Ensayo Mental del Gesto"},{id:9,c:"Liderazgo Autocrático"},{id:9,c:"Control Centralizado de Decisión"},{id:10,c:"Cohesión Grupal"},{id:10,c:"Unión para Objetivo Común"},{id:11,c:"Burnout"},{id:11,c:"Agotamiento Psicológico"},{id:12,c:"Transferencia Positiva"},{id:12,c:"Habilidad que Ayuda a Otra"},{id:13,c:"Estilo de Mando Directo"},{id:13,c:"Instrucción Repetitiva"},{id:14,c:"Descubrimiento Guiado"},{id:14,c:"El Alumno resuelve el Problema"},{id:15,c:"Ansiedad Competitiva"},{id:15,c:"Estrés Pre-Partido"}]}
        ];

        let nivelActual = 0, elegidas = [], aciertos = 0, segs = 0, timer, andando = false;

        function iniciar() {
            const tab = document.getElementById('tablero'); tab.innerHTML = '';
            document.getElementById('nivel-titulo').innerText = niveles[nivelActual].t;
            const mazo = [...niveles[nivelActual].p].sort(() => Math.random() - 0.5);
            mazo.forEach(p => {
                const div = document.createElement('div'); div.className = 'carta'; div.innerText = "UNIV";
                div.onclick = () => {
                    if(!andando) { timer = setInterval(() => { segs++; document.getElementById('cronometro').innerText = Math.floor(segs/60).toString().padStart(2,'0') + ":" + (segs%60).toString().padStart(2,'0'); }, 1000); andando = true; }
                    if(elegidas.length < 2 && !div.classList.contains('volteada')) {
                        div.classList.add('volteada'); div.innerText = p.c; elegidas.push({div, p});
                        if(elegidas.length === 2) {
                            if(elegidas[0].p.id === elegidas[1].p.id) {
                                setTimeout(() => { elegidas.forEach(e => e.div.classList.add('correcta')); elegidas = []; aciertos++; if(aciertos === 15) ganar(); }, 400);
                            } else {
                                setTimeout(() => { elegidas.forEach(e => { e.div.classList.remove('volteada'); e.div.innerText = "UNIV"; }); elegidas = []; }, 800);
                            }
                        }
                    }
                };
                tab.appendChild(div);
            });
        }
        function ganar() {
            clearInterval(timer); document.getElementById('tiempo-final').innerText = "Tiempo de ejecución: " + document.getElementById('cronometro').innerText;
            if(nivelActual === 4) { document.getElementById('msg-h2').innerText = "¡EXAMEN FINAL APROBADO!"; document.getElementById('p-nota').innerText = "NOTA FINAL: 5.0"; document.getElementById('btn-siguiente').innerText = "REINICIAR"; }
            document.getElementById('mensaje-nivel').style.display = 'block';
        }
        function siguienteNivel() {
            document.getElementById('mensaje-nivel').style.display = 'none';
            if(nivelActual < 4) { nivelActual++; aciertos = 0; segs = 0; andando = false; document.getElementById('cronometro').innerText = "00:00"; iniciar(); }
            else location.reload();
        }
        iniciar();
    </script>
</body>
</html>
