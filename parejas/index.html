<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad de Conocimiento Deportivo</title>
    <style>
        :root { --verde: #2e7d32; --oro: #ffd600; --negro: #1a1a1a; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--negro); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; margin: 0; }
        #pantalla-inicio { text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; border: 3px solid var(--oro); box-shadow: 0 0 50px rgba(0,0,0,0.9); max-width: 600px; }
        #pantalla-inicio h1 { color: var(--oro); margin-top: 0; }
        #btn-iniciar { background: var(--oro); color: var(--negro); border: none; padding: 20px 40px; font-weight: bold; font-size: 1.3rem; cursor: pointer; border-radius: 10px; text-transform: uppercase; margin-top: 20px; }
        #juego-contenedor { display: none; flex-direction: column; align-items: center; width: 100%; }
        .tablero { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; background: #004d00; padding: 15px; border-radius: 12px; }
        .carta { width: 140px; height: 80px; background: var(--verde); border: 1px solid white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 0.8rem; font-weight: bold; text-align: center; border-radius: 6px; user-select: none; }
        .carta.volteada { background: var(--blanco); color: black; }
        .carta.correcta { visibility: hidden; opacity: 0; }
        #mensaje-nivel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 30px; border-radius: 15px; text-align: center; border: 5px solid var(--oro); z-index: 1000; }
        @media (max-width: 800px) { .tablero { grid-template-columns: repeat(4, 1fr); } .carta { width: 85px; height: 70px; font-size: 0.65rem; } }
    </style>
</head>
<body>
    <div id="pantalla-inicio">
        <h1>Actividad de Conocimiento Deportivo</h1>
        <p>Esta actividad consta de **5 niveles** temáticos. Cada nivel completado te otorgará **+1.0 punto** para tu calificación final. Encuentra las 15 parejas de cada nivel.</p>
        <button id="btn-iniciar">Iniciar Actividad (5 Niveles)</button>
    </div>

    <div id="juego-contenedor">
        <h2 id="nivel-titulo" style="color:var(--oro)"></h2>
        <div id="cronometro" style="font-size:1.5rem; margin-bottom:10px; border:1px solid var(--oro); padding:5px 15px;">00:00</div>
        <div class="tablero" id="tablero"></div>
        <div id="mensaje-nivel">
            <h2 id="msg-h2">¡Nivel Completado!</h2>
            <p id="p-nota">Puntos: +1.0</p>
            <button onclick="siguienteNivel()" style="padding:10px 20px; cursor:pointer; font-weight:bold;">SIGUIENTE TEMA</button>
        </div>
    </div>
